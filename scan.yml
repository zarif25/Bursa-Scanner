name: Bursa Market Scanner — Saham Alert

on:
  schedule:
    # ── Bursa trading hours: Mon–Fri 9:00am–5:00pm MYT (UTC+8) ──────────────
    # GitHub cron uses UTC. MYT = UTC+8, subtract 8hrs for UTC equivalent.
    # 9:00am MYT = 1:00am UTC  |  5:00pm MYT = 9:00am UTC
    - cron: '0,30 1-8 * * 1-5'   # every 30 min, 9:00am–4:30pm MYT
    - cron: '0 9 * * 1-5'        # final run at 5:00pm MYT

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual test'

jobs:
  scan:
    name: Scan Bursa Malaysia
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # latest — Node.js 24 compatible

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0    # latest — Node.js 24 compatible
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Upload scan log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4.4.3  # latest — Node.js 24 compatible
        with:
          name: scan-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
