name: Bursa Market Scanner — Saham Alert

on:
  schedule:
    - cron: '0,30 1-8 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual test'

jobs:
  scan:
    name: Scan Bursa Malaysia
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          clean: true        # always fresh checkout

      - name: Verify files
        run: |
          echo "=== stocks.json count ==="
          python3 -c "import json; d=json.load(open('stocks.json')); print(f'stocks.json has {len(d)} entries')"
          echo "=== scanner.py Layer 2 ==="
          grep -n "json_path\|Layer 2\|> 500" scanner.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Upload scan log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: scan-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
