name: Bursa Market Scanner — Saham Alert

on:
  schedule:
   - cron: '*/5 * * * *'
    - cron: '0 9 * * 1-5'
  repository_dispatch:
    types: [run-scan]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual test'

jobs:
  scan:
    name: Scan Bursa Malaysia
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          clean: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Commit dedup tracking file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain alerted_today.json)" ]; then
            git add alerted_today.json
            git commit -m "Update alerted_today.json [skip ci]"
            git push
          else
            echo "No changes to alerted_today.json"
          fi

      - name: Upload scan log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: scan-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
