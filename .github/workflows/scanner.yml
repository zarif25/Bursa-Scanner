name: Bursa Market Scanner — Saham Alert

on:
  repository_dispatch:
    types: [run-scan]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual test'
  schedule:
    # Scheduled times in UTC (Malaysia Time is UTC+8)
    # 9:15 AM MYT -> 1:15 AM UTC
    - cron: '15 1 * * 1-5'
    # 9:45 AM MYT -> 1:45 AM UTC
    - cron: '45 1 * * 1-5'
    # 10:15 AM MYT -> 2:15 AM UTC
    - cron: '15 2 * * 1-5'
    # 10:45 AM MYT -> 2:45 AM UTC
    - cron: '45 2 * * 1-5'
    # 11:15 AM MYT -> 3:15 AM UTC
    - cron: '15 3 * * 1-5'
    # 11:45 AM MYT -> 3:45 AM UTC
    - cron: '45 3 * * 1-5'
    # 12:15 PM MYT -> 4:15 AM UTC
    - cron: '15 4 * * 1-5'
    # 12:45 PM MYT -> 4:45 AM UTC
    - cron: '45 4 * * 1-5'
    # 2:15 PM MYT -> 6:15 AM UTC
    - cron: '15 6 * * 1-5'
    # 2:45 PM MYT -> 6:45 AM UTC
    - cron: '45 6 * * 1-5'
    # 3:15 PM MYT -> 7:15 AM UTC
    - cron: '15 7 * * 1-5'
    # 3:45 PM MYT -> 7:45 AM UTC
    - cron: '45 7 * * 1-5'
    # 4:15 PM MYT -> 8:15 AM UTC
    - cron: '15 8 * * 1-5'
    # 4:45 PM MYT -> 8:45 AM UTC
    - cron: '45 8 * * 1-5'
    # 5:15 PM MYT -> 9:15 AM UTC
    - cron: '15 9 * * 1-5'

jobs:
  scan:
    name: Scan Bursa Malaysia
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          clean: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Commit dedup tracking file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain alerted_today.json)" ]; then
            git add alerted_today.json
            git commit -m "Update alerted_today.json [skip ci]"
            git push
          else
            echo "No changes to alerted_today.json"
          fi

      - name: Upload scan log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: scan-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
